<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>とりぴーす｜サービス終了のお知らせ</title>
<meta name="description" content="ブラウザゲーム「とりぴーす」は2026年4月27日をもってサービスを終了しました。">
<meta name="robots" content="noindex">
<!-- OGP -->
<meta property="og:title" content="とりぴーす｜サービス終了のお知らせ">
<meta property="og:description" content="ブラウザゲーム「とりぴーす」は2026年4月27日をもってサービスを終了しました。">
<meta property="og:url" content="https://maropiyo.com/toripiece/entry/">
<meta property="og:type" content="website">
<link rel="icon" href="/favicon.ico">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --yellow: #FFD54F;
  --yellow-dark: #E59F43;
  --yellow-light: #FFF8E1;
  --yellow-bg: #FFF8E1;
  --orange: #E59F43;
  --orange-dark: #D08A30;
  --gray-light: #F5F0E8;
  --gray: #8D6E63;
  --gray-dark: #5D4037;
  --white: #FFFFFF;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: 'M PLUS Rounded 1c', -apple-system, BlinkMacSystemFont, sans-serif;
  background-color: var(--yellow-bg);
  background-image: radial-gradient(circle, #F0E0C8 1px, transparent 1px);
  background-size: 24px 24px;
  min-height: 100vh;
  color: var(--gray-dark);
  display: flex;
  flex-direction: column;
}

.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 20px;
  flex: 1;
  width: 100%;
}

.header {
  text-align: center;
  padding: 30px 20px 20px;
}

.header h1 {
  font-size: 1.6rem;
  font-weight: 900;
  color: var(--orange);
  line-height: 1.4;
  margin-bottom: 8px;
}

.card {
  background: var(--white);
  border: 2px solid var(--yellow);
  border-radius: 8px;
  padding: 24px;
  margin-bottom: 16px;
}

.card p {
  line-height: 1.9;
  margin-bottom: 12px;
  font-weight: 700;
  color: #8D6E63;
}

.card p:last-child {
  margin-bottom: 0;
}

.card .lead {
  font-size: 1.05rem;
  color: var(--gray-dark);
}

.home-link {
  display: inline-block;
  margin-top: 8px;
  padding: 12px 28px;
  background: var(--orange);
  color: var(--white);
  font-weight: 800;
  font-size: 1rem;
  border-radius: 8px;
  text-decoration: none;
  border: 2px solid var(--orange-dark);
  transition: all 0.15s;
}

.home-link:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(120,80,20,.12);
}

.action {
  text-align: center;
  margin-top: 8px;
}

.footer {
  text-align: center;
  padding: 24px;
  font-weight: 700;
}

.footer a {
  color: var(--orange);
  text-decoration: none;
}

.footer a:hover {
  text-decoration: underline;
}

.footer p {
  margin-bottom: 8px;
  color: #8D6E63;
}

body.dark {
  background: #2a2a2a;
  background-image: none;
  color: #e0d6c8;
}
body.dark .header h1 { color: #FFD54F; }
body.dark .card { background: #3a3a3a; border-color: #5D4037; }
body.dark .card p { color: #bba88a; }
body.dark .card .lead { color: #e0d6c8; }
body.dark .home-link { background: #E59F43; border-color: #D08A30; }
body.dark .footer a { color: #FFD54F; }
body.dark .footer p { color: #8D6E63; }

@media (max-width: 500px) {
  .header h1 { font-size: 1.3rem; }
  .card { padding: 16px; }
}
</style>
</head>
<body>
<script>
var dk=localStorage.getItem('dark'),h=new Date().getHours();
if(dk==='1'||(dk===null&&(h>=22||h<6))){document.body.classList.add('dark')}
</script>

<div class="container">
  <header class="header">
    <h1>とりぴーす<br>サービス終了のお知らせ</h1>
  </header>

  <div class="card">
    <p class="lead">ブラウザゲーム「とりぴーす」は2026年4月27日をもってサービスを終了しました。</p>
    <p>これまで遊んでくださったみなさま、ありがとうございました！</p>
  </div>

  <div class="action">
    <a href="/" class="home-link">まろぴよの部屋へ</a>
  </div>

  <footer class="footer">
    <p>© 2023 - 2026 まろぴよ</p>
  </footer>
</div>

</body>
</html>
